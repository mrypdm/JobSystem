name: .NET Integration Tests

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'infrastructure/Tools/**'
      - '!tests/Tests.Unit/**'
      - '!tests/MathTask/**'
      - '.github/workflows/integration-tests.dotnet.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'infrastructure/Tools/**'
      - '!tests/Tests.Unit/**'
      - '!tests/MathTask/**'
      - '.github/workflows/integration-tests.dotnet.yml'

jobs:
  main:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Pull alpine image
        run: docker pull alpine:latest

      - name: Start PostgreSQL container
        run: |
            cd ${{ github.workspace }}/infrastructure/Tools/Database
            sudo bash ./init.sh
            docker compose -f docker-compose.github.yaml up -d
            cd ${{ github.workspace }}
            sleep 5 # waiting for full startup of service

      - name: Start Apache Kafka container
        run: |
            cd ${{ github.workspace }}/infrastructure/Tools/Broker
            sudo bash ./init.sh
            docker compose -f docker-compose.github.yaml up -d
            cd ${{ github.workspace }}
            sleep 5 # waiting for full startup of service

      - name: Initialize PostgreSQL and Apache Kafka
        run: |
            cd ${{ github.workspace }}/src/Shared/Shared.SimpleInitializer
            dotnet run --no-build
            cd ${{ github.workspace }}
        timeout-minutes: 1

      - name: Start Job.WebApi container
        run: |
            cd ${{ github.workspace }}/src/Job/Job.WebApi
            docker compose -f docker-compose.github.yaml up -d
            cd ${{ github.workspace }}
            sleep 5 # waiting for full startup of service

      - name: Test
        run: dotnet test --no-build --verbosity normal --filter TestCategory=Integration
        timeout-minutes: 2

      - name: Finalize Job.WebApi container
        if: always()
        run: |
            cd ${{ github.workspace }}/src/Job/Job.WebApi
            docker compose -f docker-compose.github.yaml logs
            docker compose -f docker-compose.github.yaml down -t 1
            cd ${{ github.workspace }}

      - name: Finalize Apache Kafka container
        if: always()
        run: |
            cd ${{ github.workspace }}/src/Job/Job.WebApi
            docker compose -f docker-compose.github.yaml logs
            docker compose -f docker-compose.github.yaml down -t 1
            sudo rm -rf ./data
            cd ${{ github.workspace }}
      - name: Finalize PostgreSQL container
        if: always()
        run: |
            cd ${{ github.workspace }}/src/Job/Job.WebApi
            docker compose -f docker-compose.github.yaml logs
            docker compose -f docker-compose.github.yaml down -t 1
            sudo rm -rf ./data
            cd ${{ github.workspace }}
